<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Scribe — Notes</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0E1B21">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Smart Scribe">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#DCE2E4; --surface:#FBFCFC; --surface-2:#F1F4F5;
    --ink:#10222A; --ink-soft:#4B5C63; --ink-faint:#86959A;
    --line:#C4CED1; --line-soft:#DBE1E3;
    --amber:#E0912F; --amber-dim:#B4741F;
    --steel:#2B6C78; --steel-dim:#1E505A;
    --rust:#A8402A; --green:#2f7d46;
    --console:#0E1B21; --trace:#E8A33D;
    --sans:"Inter",system-ui,sans-serif;
    --disp:"Space Grotesk",system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,monospace;
    --r:10px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  button{font-family:var(--disp);cursor:pointer;border:none;background:none;color:inherit}
  button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid var(--steel);outline-offset:2px}
  ::selection{background:var(--amber);color:#fff}

  .app{display:grid;grid-template-columns:264px 1fr;height:100vh;min-height:0}

  .side{background:var(--console);color:#C7D2D6;display:flex;flex-direction:column;min-height:0;border-right:1px solid #06121a}
  .brand{padding:22px 20px 16px;border-bottom:1px solid #1e333c}
  .brand h1{font-family:var(--disp);font-weight:700;font-size:16px;letter-spacing:.02em;color:#F3F6F6;margin:0;line-height:1.25}
  .brand .sub{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--trace);margin-top:7px}
  .side-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 8px;font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#7f939a}
  .proj-list{flex:1;overflow-y:auto;padding:0 12px 12px;min-height:0}
  .proj{width:100%;text-align:left;display:block;padding:11px 12px;border-radius:8px;margin-bottom:5px;color:#c7d2d6;font-weight:500;font-size:14px;border:1px solid transparent;transition:background .12s,border-color .12s}
  .proj:hover{background:#17303a}
  .proj.active{background:#17303a;border-color:var(--steel)}
  .proj .nm{display:block;font-family:var(--disp);letter-spacing:.01em}
  .proj .meta{display:block;font-family:var(--mono);font-size:10.5px;color:#7f939a;margin-top:3px;letter-spacing:.03em}
  .proj.active .meta{color:var(--trace)}
  .proj-empty{color:#6a7e85;font-size:13px;padding:14px 12px;line-height:1.5}
  .new-btn{margin:0 12px 14px;padding:11px;border-radius:8px;width:calc(100% - 24px);background:var(--amber);color:#241403;font-weight:600;font-size:13.5px;letter-spacing:.02em;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .12s}
  .new-btn:hover{background:#eca447}
  .side-foot{padding:12px 20px 16px;border-top:1px solid #1e333c;display:flex;flex-direction:column;gap:8px}
  .link-btn{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:#7f939a;text-align:left;background:none;padding:0;transition:color .12s}
  .link-btn:hover{color:var(--rust)}

  .main{overflow-y:auto;min-height:0;display:flex;flex-direction:column}
  .wrap{max-width:840px;width:100%;margin:0 auto;padding:26px 32px 60px}

  .ref{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;margin-bottom:20px}
  .ref-top{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
  .ref-top h2{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin:0;font-weight:600}
  .ref-toggle{font-family:var(--mono);font-size:11px;color:var(--steel);letter-spacing:.08em}
  .ref-grid{margin-top:14px;display:grid;gap:9px}
  .ref.collapsed .ref-grid{display:none}
  .ref-sub{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin:4px 0 -2px}
  .ref-row{display:grid;grid-template-columns:220px 1fr;gap:14px;align-items:baseline}
  .ref-cmd{font-family:var(--mono);font-size:12.5px;color:var(--ink);background:var(--surface-2);border:1px solid var(--line-soft);border-radius:5px;padding:4px 8px}
  .ref-cmd b{color:var(--steel-dim);font-weight:600}
  .ref-desc{font-size:13px;color:var(--ink-soft)}
  @media(max-width:560px){.ref-row{grid-template-columns:1fr}}

  .p-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:4px}
  .p-title{font-family:var(--disp);font-weight:700;font-size:27px;letter-spacing:-.01em;margin:0}
  .p-title-edit{font-family:var(--disp);font-weight:700;font-size:27px;letter-spacing:-.01em;border:none;border-bottom:2px solid var(--amber);background:transparent;color:var(--ink);width:100%;padding:0 0 2px}
  .p-sub{font-family:var(--mono);font-size:11.5px;color:var(--ink-faint);letter-spacing:.05em;margin:3px 0 20px}
  .edit-title{font-family:var(--mono);font-size:11px;color:var(--steel);letter-spacing:.05em;padding:0}

  .console{background:var(--console);border-radius:var(--r);overflow:hidden;box-shadow:0 8px 22px -14px rgba(16,34,42,.5);margin-bottom:20px}
  .console-bar{display:flex;align-items:center;gap:12px;padding:13px 16px;flex-wrap:wrap}
  .status-pill{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;letter-spacing:.13em;text-transform:uppercase;font-weight:600;padding:6px 12px;border-radius:20px;white-space:nowrap}
  .status-pill.on{background:rgba(232,163,61,.16);color:var(--trace)}
  .status-pill.off{background:#1c333c;color:#83979e}
  .dot{width:8px;height:8px;border-radius:50%}
  .status-pill.on .dot{background:var(--trace);animation:pulse 1.2s ease-in-out infinite}
  .status-pill.off .dot{background:#546a72}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(232,163,61,.5)}50%{opacity:.5;box-shadow:0 0 0 5px rgba(232,163,61,0)}}
  @media(prefers-reduced-motion:reduce){.status-pill.on .dot,.mic-live{animation:none}}
  .mic-area{flex:1;min-width:120px;display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11.5px;color:#8fa2a8;overflow:hidden}
  .mic-live{width:9px;height:9px;border-radius:50%;background:#5ec2d6;flex:none;animation:pulse 1.1s ease-in-out infinite}
  .mic-txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mic-txt em{color:#c9d6da;font-style:normal}
  .btn-mic{font-family:var(--disp);font-weight:600;font-size:13px;padding:9px 15px;border-radius:8px;white-space:nowrap;background:#2a444d;color:#e7eef0;border:1px solid #3a5761;transition:filter .12s,background .12s}
  .btn-mic:hover:not(:disabled){filter:brightness(1.1)}
  .btn-mic.live{background:var(--rust);color:#fff;border-color:var(--rust)}
  .btn-mic:disabled{opacity:.4;cursor:not-allowed}
  .toggle-rec{font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:.02em;padding:9px 16px;border-radius:8px;white-space:nowrap;transition:filter .12s,background .12s}
  .toggle-rec.start{background:var(--trace);color:#241403}
  .toggle-rec.stop{background:#2a444d;color:#e7eef0;border:1px solid #3a5761}
  .toggle-rec:hover{filter:brightness(1.06)}
  .console-hint{padding:0 16px 11px;font-family:var(--mono);font-size:10px;letter-spacing:.05em;color:#5f767e;line-height:1.5}

  .entry{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:22px;transition:box-shadow .15s}
  .entry.locked{opacity:.55;pointer-events:none}
  .entry.capturing{box-shadow:0 0 0 2px var(--steel)}
  .entry-tabs{display:flex;gap:6px;margin-bottom:11px;flex-wrap:wrap}
  .type-tab{font-family:var(--mono);font-size:11px;letter-spacing:.05em;color:var(--ink-soft);padding:5px 11px;border-radius:6px;border:1px solid var(--line);background:var(--surface-2);transition:all .12s}
  .type-tab.sel{background:var(--steel);color:#fff;border-color:var(--steel)}
  textarea.note-in{width:100%;min-height:96px;resize:vertical;border:1px solid var(--line);border-radius:8px;padding:12px 14px;font-family:var(--sans);font-size:15px;color:var(--ink);background:var(--surface-2);line-height:1.6}
  textarea.note-in::placeholder{color:var(--ink-faint)}
  .entry-actions{display:flex;gap:9px;margin-top:11px;flex-wrap:wrap}
  .btn{font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:.02em;padding:9px 15px;border-radius:8px;transition:filter .12s,background .12s}
  .btn-primary{background:var(--ink);color:#fff}
  .btn-primary:hover{background:#1c3540}
  .btn-ghost{background:var(--surface-2);color:var(--ink-soft);border:1px solid var(--line)}
  .btn-ghost:hover{background:#e7ecee}
  .btn-rust{background:#f6e6e2;color:var(--rust);border:1px solid #e6c6bf}
  .btn-rust:hover{background:#f0d8d2}
  .btn-steel{background:var(--steel);color:#fff}
  .btn-steel:hover{background:var(--steel-dim)}
  .lock-note{font-family:var(--mono);font-size:11px;color:var(--amber-dim);margin-top:9px;letter-spacing:.02em}

  .log-head{display:flex;align-items:center;justify-content:space-between;margin:0 2px 12px}
  .log-head h3{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin:0;font-weight:600}
  .log-count{font-family:var(--mono);font-size:11px;color:var(--ink-faint);letter-spacing:.05em}
  .note{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;margin-bottom:9px;position:relative}
  .note-meta{display:flex;align-items:center;gap:10px;margin-bottom:7px;flex-wrap:wrap}
  .note-seq{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink)}
  .note-tag{font-family:var(--mono);font-size:10px;letter-spacing:.09em;text-transform:uppercase;padding:2px 8px;border-radius:4px;font-weight:600}
  .tag-obs{background:#e3eef0;color:var(--steel-dim)}
  .tag-tech{background:#fbeed6;color:var(--amber-dim)}
  .tag-proc{background:#e8e6f0;color:#5b4b8a}
  .tag-gen{background:var(--surface-2);color:var(--ink-soft)}
  .note-sync{font-family:var(--mono);font-size:10px;color:var(--green);letter-spacing:.04em}
  .note-time{font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin-left:auto;letter-spacing:.03em}
  .note-body{font-size:14.5px;color:var(--ink);white-space:pre-wrap;line-height:1.55}
  .note-del{position:absolute;top:12px;right:12px;font-family:var(--mono);font-size:15px;line-height:1;color:var(--ink-faint);padding:2px 6px;border-radius:5px;transition:all .12s}
  .note-del:hover{color:var(--rust);background:#f6e6e2}
  .log-empty{border:1px dashed var(--line);border-radius:var(--r);padding:30px;text-align:center;color:var(--ink-faint);font-size:13.5px;line-height:1.55}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);margin-top:26px;overflow:hidden}
  .panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 18px;border-bottom:1px solid var(--line-soft);flex-wrap:wrap}
  .panel-head h3{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin:0;font-weight:600}
  .panel-btns{display:flex;gap:8px;flex-wrap:wrap}
  .panel-body{padding:16px 18px}

  .sync-chip{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;padding:4px 10px;border-radius:20px;font-weight:600}
  .sync-on{background:#e3f0e6;color:var(--green)}
  .sync-off{background:var(--surface-2);color:var(--ink-faint)}
  .sync-err{background:#f6e6e2;color:var(--rust)}
  .field{margin-bottom:12px}
  .field label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
  .field-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  input.txt{flex:1;min-width:200px;border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-family:var(--mono);font-size:12.5px;color:var(--ink);background:var(--surface-2)}
  .toggle-row{display:flex;align-items:center;gap:9px;margin:4px 0 14px}
  .toggle-row input{width:16px;height:16px;accent-color:var(--steel)}
  .toggle-row label{font-size:13px;color:var(--ink-soft)}
  .gdoc-actions{display:flex;gap:8px;flex-wrap:wrap}
  .gdoc-note{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);margin-top:11px;line-height:1.6}
  .setup{margin-top:14px;border-top:1px dashed var(--line);padding-top:12px}
  .setup summary{cursor:pointer;font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--steel);text-transform:uppercase}
  .setup ol{margin:12px 0;padding-left:20px;font-size:13px;color:var(--ink-soft);line-height:1.75}
  .setup ol b{color:var(--ink)}
  pre.code{background:var(--console);color:#cfe0e4;font-family:var(--mono);font-size:11px;line-height:1.55;padding:14px;border-radius:8px;overflow:auto;max-height:260px;white-space:pre;margin:6px 0 10px}

  .wiz-intro{font-size:13.5px;color:var(--ink-soft);margin-bottom:16px;line-height:1.55}
  .step{display:grid;grid-template-columns:34px 1fr;gap:14px;padding:14px 0;border-top:1px solid var(--line-soft)}
  .step:first-of-type{border-top:none;padding-top:2px}
  .step-n{width:30px;height:30px;border-radius:50%;background:var(--steel);color:#fff;font-family:var(--disp);font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center}
  .step.done .step-n{background:var(--green)}
  .step-title{font-family:var(--disp);font-weight:600;font-size:15px;color:var(--ink);margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .step-once{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber-dim);background:#fbeed6;padding:2px 7px;border-radius:20px;font-weight:600}
  .step-text{font-size:13px;color:var(--ink-soft);line-height:1.6;margin-bottom:11px}
  .step-text b{color:var(--ink)}
  .step .field-row{margin-top:4px}
  .step .gdoc-actions{margin-bottom:2px}
  a.btn{text-decoration:none;display:inline-flex;align-items:center}
  .connected .connected-line{font-size:14.5px;color:var(--green);font-weight:500;margin-bottom:14px;line-height:1.5}
  .spk{font-weight:600;color:var(--steel-dim)}
  .spk-intro{font-size:13px;color:var(--ink-soft);margin-bottom:12px;line-height:1.55}
  .spk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
  .spk-row{display:flex;align-items:center;gap:9px}
  .spk-badge{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;color:var(--ink-soft);background:var(--surface-2);border:1px solid var(--line);border-radius:6px;padding:5px 8px;white-space:nowrap;min-width:74px;text-align:center}
  .spk-input{min-width:0}
  .note-body .spk{margin-right:2px}
  .gdoc-err{font-family:var(--mono);font-size:11.5px;color:var(--rust);background:#f6e6e2;border:1px solid #e6c6bf;border-radius:8px;padding:10px 12px;margin-top:12px;line-height:1.6}

  .field-note{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);margin-top:6px;line-height:1.6}
  .field-note b{color:var(--ink-soft)}
  select.txt{appearance:auto}
  .modal-overlay{position:fixed;inset:0;background:rgba(6,18,26,.5);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:14px;width:min(460px,100%);box-shadow:0 24px 60px -20px rgba(16,34,42,.6);overflow:hidden}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line-soft)}
  .modal-head h3{font-family:var(--disp);font-weight:700;font-size:17px;margin:0}
  .modal-x{font-size:22px;line-height:1;color:var(--ink-faint);padding:2px 8px;border-radius:6px}
  .modal-x:hover{color:var(--ink);background:var(--surface-2)}
  .modal-body{padding:18px}
  .modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:14px 18px;border-top:1px solid var(--line-soft)}

  pre.export-pre{margin:0;padding:20px 22px;font-family:var(--mono);font-size:12.5px;line-height:1.65;color:var(--ink);white-space:pre-wrap;word-break:break-word;background:#fdfefe;max-height:440px;overflow:auto}
  .export-empty{padding:24px 22px;color:var(--ink-faint);font-size:13.5px}
  .export-stamp{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);letter-spacing:.04em}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--ink);color:#fff;font-family:var(--mono);font-size:12.5px;letter-spacing:.03em;padding:11px 18px;border-radius:8px;opacity:0;pointer-events:none;transition:all .22s;z-index:50;max-width:88vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .center-state{display:flex;align-items:center;justify-content:center;height:100%;padding:40px;text-align:center}
  .center-state .inner{max-width:360px}
  .center-state h2{font-family:var(--disp);font-size:20px;margin:0 0 8px}
  .center-state p{color:var(--ink-soft);font-size:14px;margin:0 0 18px}
  .spin{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--steel);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:720px){
    .app{grid-template-columns:1fr}
    .side{position:fixed;inset:0 30% 0 0;z-index:40;transform:translateX(-105%);transition:transform .2s;box-shadow:0 0 40px rgba(0,0,0,.3)}
    .side.open{transform:none}
    .wrap{padding:18px 18px 60px}
    .menu-btn{display:inline-flex}
  }
  .menu-btn{display:none;position:fixed;top:14px;left:14px;z-index:45;background:var(--console);color:#fff;width:40px;height:40px;border-radius:9px;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 14px rgba(0,0,0,.2)}
  .scrim{display:none;position:fixed;inset:0;background:rgba(6,18,26,.4);z-index:39}
  .scrim.open{display:block}
</style>
</head>
<body>
<button class="menu-btn" id="menuBtn" aria-label="Toggle projects">☰</button>
<div class="scrim" id="scrim"></div>

<div class="app">
  <aside class="side" id="side">
    <div class="brand">
      <h1>Smart Scribe</h1>
      <div class="sub">Notes</div>
    </div>
    <div class="side-head"><span>Projects</span><span id="projCount">—</span></div>
    <div class="proj-list" id="projList"></div>
    <button class="new-btn" id="newProj">＋ New project</button>
    <div class="side-foot">
      <button class="link-btn" id="updateBtn">⬆ Update software</button>
      <button class="link-btn" id="settingsBtn">⚙ Settings (voice engine &amp; key)</button>
      <button class="link-btn" id="resetBtn">⟲ Reset all data</button>
      <div style="font-family:var(--mono);font-size:10px;color:#5f767e;letter-spacing:.05em;margin-top:2px">Smart Scribe v1.1.3</div>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="center-state" id="loading">
      <div class="inner"><div class="spin"></div><p>Loading your logs…</p></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============ persistence ============ */
const KEY = "chimescribe:data:v3";
const APP_VERSION = "1.1.3";
const UPDATE_REPO = "alexandersellers-hue/Chime-Scribe";
let state = { projects: [], activeId: null, cloudKey: "", voiceEngine: "auto" };
let ui = { draftType: "obs", refOpen: true };

const TYPES = {
  obs:  { label:"Observation",         tag:"tag-obs"  },
  meet: { label:"Meeting Scribe",      tag:"tag-tech" },
  conv: { label:"Conversation Scribe", tag:"tag-proc" },
  gen:  { label:"General Note",        tag:"tag-gen"  },
};
// Modes that use multi-speaker (diarized) transcription:
const DIARIZE_MODES = new Set(["meet","conv"]);
const MAX_SPEAKERS = 30;
/* Storage adapter: uses Claude.ai artifact storage when present,
   otherwise the browser's localStorage (downloaded file), otherwise memory. */
const store = (function(){
  const mem = {};
  const hasWin = (typeof window!=="undefined" && window.storage && typeof window.storage.get==="function");
  let hasLS = false;
  try{ const k="__cs_probe"; window.localStorage.setItem(k,"1"); window.localStorage.removeItem(k); hasLS=true; }catch(e){ hasLS=false; }
  const mode = hasWin ? "window" : (hasLS ? "local" : "memory");
  return {
    mode,
    async get(key){
      if(mode==="window"){ try{ const r=await window.storage.get(key,false); return r&&r.value?r.value:null; }catch(e){ return null; } }
      if(mode==="local"){ return window.localStorage.getItem(key); }
      return (key in mem) ? mem[key] : null;
    },
    async set(key,val){
      if(mode==="window"){ return await window.storage.set(key,val,false); }
      if(mode==="local"){ window.localStorage.setItem(key,val); return true; }
      mem[key]=val; return true;
    },
    async del(key){
      if(mode==="window"){ try{ await window.storage.delete(key,false);}catch(e){} return; }
      if(mode==="local"){ window.localStorage.removeItem(key); return; }
      delete mem[key];
    }
  };
})();

async function loadState(){
  try{
    const raw = await store.get(KEY);
    if(raw){ state = JSON.parse(raw); }
  }catch(e){ /* first run or unreadable: start fresh */ }
  if(!state.projects) state.projects = [];
  if(typeof state.cloudKey !== "string") state.cloudKey = "";
  if(typeof state.voiceEngine !== "string") state.voiceEngine = "auto";
  state.projects.forEach(p=>{
    if(!p.speakers || typeof p.speakers!=="object") p.speakers = {};
  });
}
let saveTimer=null, saveWarned=false;
function saveState(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{ await store.set(KEY, JSON.stringify(state)); }
    catch(e){ if(!saveWarned){ saveWarned=true; toast("This browser is blocking storage — notes stay for this session only."); } }
  }, 100);
}

/* ============ helpers ============ */
const $ = s => document.querySelector(s);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
function stamp(d=new Date()){
  const p=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
function activeProject(){ return state.projects.find(p=>p.id===state.activeId) || null; }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
let toastTimer=null;
function toast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2600);
}

/* ============ project ops ============ */

/* Small in-app text prompt (Electron blocks the browser prompt()). */
function askText(title, label, def, okLabel, cb){

  wrap.className="modal-overlay"; wrap.id="promptOverlay";

/* ============ note ops ============ */
function toggleRecording(){

function addNote(text, type){

/* ============ draft persistence ============ */
function setDraft(text,{dom=true}={}){

/* ============ speaker labels (diarization) ============ */
function speakerName(p, n){
  const custom = p && p.speakers ? p.speakers[String(n)] : null;
  return (custom && custom.trim()) ? custom.trim() : ("Person " + (n+1));
}
function detectedSpeakers(p){
  const set = new Set();
  const scan = (t)=>{ const re=/\[\[spk:(\d+)\]\]/g; let m; while((m=re.exec(t||""))!==null){ const n=parseInt(m[1],10); if(n>=0 && n<MAX_SPEAKERS) set.add(n); } };
  (p.notes||[]).forEach(n=>scan(n.text));
  scan(p.draft);
  Object.keys(p.speakers||{}).forEach(k=>{ const n=parseInt(k,10); if(!isNaN(n)) set.add(n); });
  return Array.from(set).sort((a,b)=>a-b).slice(0, MAX_SPEAKERS);
}
function hasSpeakers(p){ return detectedSpeakers(p).length>0; }
// Resolve [[spk:N]] markers to "Name: " (for plain text / export)
function resolveSpeakers(p, text){
  return (text||"").replace(/\[\[spk:(\d+)\]\]\s*/g, (m,n)=> speakerName(p, parseInt(n,10)) + ": ");
}
// Render a note body to HTML with bold speaker labels
function renderNoteBody(p, text){
  let h = esc(text||"");
  h = h.replace(/\[\[spk:(\d+)\]\]\s*/g, (m,n)=> `<span class="spk">${esc(speakerName(p, parseInt(n,10)))}:</span> `);
  return h.replace(/\n/g, "<br>");
}

/* ============ export ("Complete note") ============ */
function buildExport(p){
  const now=new Date(), L=[];
  L.push("SMART SCRIBE — NOTES");
  L.push("Project: "+p.name);
  L.push("Exported: "+stamp(now));
  L.push("Total entries: "+p.notes.length);
  L.push("");
  if(!p.notes.length) L.push("(No entries logged yet.)");
  p.notes.forEach(n=>{
    L.push("──────────────────────────────────────────");
    L.push(`Entry ${String(n.seq).padStart(3,"0")}  ·  ${TYPES[n.type]?.label||"Note"}`);
    L.push("Logged: "+stamp(new Date(n.ts)));
    L.push("");
    L.push(resolveSpeakers(p, n.text));
    L.push("");
  });
  return L.join("\n");
}
function buildExportHTML(p){
  const now=new Date();
  let h=`<h1>Smart Scribe — Notes</h1>`;
  h+=`<p><b>Project:</b> ${esc(p.name)}<br><b>Exported:</b> ${stamp(now)}`;
  h+=`<br><b>Total entries:</b> ${p.notes.length}</p><hr>`;
  p.notes.forEach(n=>{
    h+=`<h3>Entry ${String(n.seq).padStart(3,"0")} · ${TYPES[n.type]?.label||"Note"}</h3>`;
    h+=`<p style="color:#666;font-size:.9em"><b>Logged:</b> ${stamp(new Date(n.ts))}</p>`;
    h+=`<p>${esc(resolveSpeakers(p, n.text)).replace(/\n/g,"<br>")}</p><hr>`;
  });
  return h;
}
// Copy the full formatted transcript (rich + plain) to the clipboard.
async function copyTranscript(){
  const p=activeProject(); if(!p) return;
  if(!p.notes.length){ toast("Log an entry first"); return; }
  const plain=buildExport(p), html=buildExportHTML(p);
  try{
    if(navigator.clipboard && window.ClipboardItem){
      await navigator.clipboard.write([ new ClipboardItem({
        "text/html": new Blob([html],{type:"text/html"}),
        "text/plain": new Blob([plain],{type:"text/plain"}),
      })]);
    } else if(navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(plain);
    } else { throw new Error("no-clipboard"); }
    toast("Copied — paste into Google Docs (Ctrl+V)");
  }catch(e){
    // Fallback: drop the text into a temporary textarea and copy from it.
    try{
      const ta=document.createElement("textarea");
      ta.value=plain; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
      toast("Copied — paste into Google Docs (Ctrl+V)");
    }catch(_){ toast("Couldn't copy automatically — try again"); }
  }
}
// Kept so the voice/typed command "complete note" still copies the transcript.
function completeNote(){ copyTranscript(); }

/* ============ voice dictation (persistent / hands-free) ============ */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const IS_ELECTRON = /electron/i.test(navigator.userAgent||"");
let voice = { mode:null, rec:null, stream:null, listening:false, active:false, capturing:false, interim:"",
              restartTimer:null, watchdog:null, retries:0,
              ws:null, recorder:null, keepAlive:null, reconnectTimer:null,
              lastSpeaker:null, diarizeActive:false };

/* Which engine to use: Chrome's built-in (free) or cloud (Deepgram). */
function chosenMode(){
  const pref = state.voiceEngine || "auto";
  if(pref==="cloud")   return "cloud";
  if(pref==="browser") return "browser";
  if(IS_ELECTRON)      return "cloud";        // desktop app has no built-in speech
  return SR ? "browser" : "cloud";
}
function voiceAvailable(){ return chosenMode()==="cloud" ? true : !!SR; }

/* Hold one mic stream open so the browser only prompts once. */
async function ensureMicStream(){
  if(voice.stream) return true;
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return true;
  try{ voice.stream = await navigator.mediaDevices.getUserMedia({audio:true}); return true; }
  catch(e){ return !(e && (e.name==="NotAllowedError" || e.name==="SecurityError")); }
}

/* ---- browser engine (Web Speech) ---- */
function buildRec(){
  const rec = new SR();
  rec.continuous = true; rec.interimResults = true; rec.lang = "en-US";
  rec.onstart = ()=>{ voice.active=true; voice.retries=0; };
  rec.onresult = (e)=>{
    let interim="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      const res=e.results[i];
      if(res.isFinal) handleFinal(res[0].transcript);
      else interim += res[0].transcript;
    }
    voice.interim = interim; setMicStatus();
  };
  rec.onerror = (e)=>{
    if(e.error==="not-allowed" || e.error==="service-not-allowed"){
      voice.listening=false; voice.active=false; stopWatchdog(); render();
      toast("Mic is blocked. Allow it in the address bar, then press Dictate again.");
    }
  };
  rec.onend = ()=>{ voice.active=false; if(voice.listening && voice.mode==="browser") scheduleRestart(120); };
  return rec;
}
function scheduleRestart(delay){ clearTimeout(voice.restartTimer); voice.restartTimer = setTimeout(safeStart, delay==null?300:delay); }
function safeStart(){
  if(!voice.listening || voice.active || voice.mode!=="browser") return;
  if(!voice.rec) voice.rec = buildRec();
  try{ voice.rec.start(); }
  catch(e){ voice.retries++; if(voice.retries>=4){ voice.rec=buildRec(); voice.retries=0; } scheduleRestart(Math.min(1500,250*voice.retries)); }
}
function startWatchdog(){ stopWatchdog(); voice.watchdog = setInterval(()=>{ if(voice.listening && voice.mode==="browser" && !voice.active) scheduleRestart(0); }, 3000); }
function stopWatchdog(){ if(voice.watchdog){ clearInterval(voice.watchdog); voice.watchdog=null; } }

/* ---- cloud engine (Deepgram streaming) ---- */
function diarizeWanted(){ return DIARIZE_MODES.has(ui.draftType); }
function dgUrl(){
  const params = { model:"nova-2", language:"en-US", smart_format:"true", punctuate:"true", interim_results:"true" };
  if(diarizeWanted()) params.diarize = "true";
  return "wss://api.deepgram.com/v1/listen?" + new URLSearchParams(params).toString();
}
// Turn Deepgram's speaker-tagged words into text with [[spk:N]] markers.
function wordsToDiarized(words){
  const segs=[]; let cur=null, buf=[];
  for(const w of words){
    let sp = (typeof w.speaker==="number") ? w.speaker : 0;
    if(sp>MAX_SPEAKERS-1) sp = MAX_SPEAKERS-1;
    const tok = w.punctuated_word || w.word || "";
    if(!tok) continue;
    if(cur===null) cur=sp;
    if(sp!==cur){ segs.push({sp:cur, text:buf.join(" ")}); cur=sp; buf=[tok]; }
    else buf.push(tok);
  }
  if(buf.length) segs.push({sp:cur, text:buf.join(" ")});
  return segs.map(s=>`[[spk:${s.sp}]] ${s.text}`).join("\n");
}
function stopRecorder(){ if(voice.recorder){ try{ voice.recorder.stop(); }catch(_){}} voice.recorder=null; }
async function startCloud(){
  const key=(state.cloudKey||"").trim();
  if(!key){ toast("Add your transcription key in Settings to use voice in the desktop app."); openSettings(); voice.listening=false; render(); return; }
  const okMic=await ensureMicStream();
  if(!okMic){ toast("Microphone permission was denied."); voice.listening=false; render(); return; }
  voice.diarizeActive = diarizeWanted();
  let ws; try{ ws=new WebSocket(dgUrl(), ["token", key]); }catch(e){ toast("Couldn't open the transcription connection."); voice.listening=false; render(); return; }
  voice.ws=ws;
  ws.onopen=()=>{
    voice.active=true; voice.retries=0; setMicStatus();
    let mime = (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported("audio/webm;codecs=opus")) ? "audio/webm;codecs=opus"
             : (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported("audio/webm")) ? "audio/webm" : "";
    try{ voice.recorder = mime ? new MediaRecorder(voice.stream,{mimeType:mime}) : new MediaRecorder(voice.stream); }
    catch(_){ try{ voice.recorder=new MediaRecorder(voice.stream); }catch(__){ toast("This browser can't capture audio for cloud voice."); return; } }
    voice.recorder.ondataavailable=(ev)=>{ if(ev.data && ev.data.size>0 && voice.ws && voice.ws.readyState===1) voice.ws.send(ev.data); };
    voice.recorder.start(250);
    voice.keepAlive=setInterval(()=>{ if(voice.ws && voice.ws.readyState===1) voice.ws.send(JSON.stringify({type:"KeepAlive"})); }, 6000);
  };
  ws.onmessage=(ev)=>{
    let msg; try{ msg=JSON.parse(ev.data); }catch(_){ return; }
    if(msg.type && msg.type!=="Results") return;
    const alt = msg.channel && msg.channel.alternatives && msg.channel.alternatives[0];
    const text = alt ? (alt.transcript||"") : "";
    if(!text) return;
    if(msg.is_final){
      const dia = (voice.diarizeActive && alt.words && alt.words.length) ? wordsToDiarized(alt.words) : null;
      handleFinal(text, dia);
      voice.interim="";
    } else {
      voice.interim=text;
    }
    setMicStatus();
  };
  ws.onerror=()=>{};
  ws.onclose=(ev)=>{
    const wasActive=voice.active; voice.active=false; stopRecorder(); clearInterval(voice.keepAlive);
    if(!voice.listening) return;
    if(ev.code===1008 || (ev.code>=4000 && ev.code<4100 && !wasActive)){
      voice.listening=false; render(); toast("Transcription key was rejected. Check it in Settings."); return;
    }
    voice.retries = wasActive ? 0 : (voice.retries+1);
    if(voice.retries>4){ voice.listening=false; render(); toast("Can't reach the transcription service. Check your key and internet."); return; }
    voice.reconnectTimer=setTimeout(()=>{ if(voice.listening) startCloud(); }, 500+300*voice.retries);
  };
}
function stopCloud(){
  clearInterval(voice.keepAlive); clearTimeout(voice.reconnectTimer); stopRecorder();
  if(voice.ws){ try{ voice.ws.send(JSON.stringify({type:"CloseStream"})); }catch(_){}
                try{ voice.ws.close(); }catch(_){}; voice.ws=null; }
}

/* ---- shared start/stop ---- */
async function startListening(){
  const p=activeProject(); if(!p) return;
  voice.mode = chosenMode();
  if(voice.mode==="browser" && !SR){ toast("Built-in voice needs Chrome. Add a transcription key in Settings for cloud voice."); openSettings(); return; }
  if(!p.recording){ p.recording=true; saveState(); }
  voice.listening=true; voice.capturing=false; voice.interim=""; voice.retries=0;
  if(voice.mode==="browser"){
    const okMic=await ensureMicStream();
    if(!okMic){ voice.listening=false; toast("Microphone permission was denied."); return; }
    if(!voice.rec) voice.rec=buildRec();
    startWatchdog(); safeStart(); render();
    toast('Listening — say “Note the following…”. Stays on until you press Stop.');
  } else {
    render(); toast("Connecting transcription…");
    startCloud();
  }
}
function stopListening(){
  voice.listening=false; voice.capturing=false; voice.interim=""; voice.retries=0;
  stopWatchdog(); clearTimeout(voice.restartTimer);
  if(voice.rec){ try{ voice.rec.stop(); }catch(_){}}
  stopCloud();
}
function releaseMic(){
  stopListening();
  if(voice.stream){ voice.stream.getTracks().forEach(t=>{try{t.stop();}catch(_){}}); voice.stream=null; }
}
function toggleListening(){ voice.listening ? (stopListening(), render()) : startListening(); }

/* ---- in-app updater (checks GitHub Releases) ---- */
function parseVer(s){ return (s||"").replace(/^v/i,"").split(".").map(n=>parseInt(n,10)||0); }
function isNewer(a,b){ const A=parseVer(a),B=parseVer(b); for(let i=0;i<Math.max(A.length,B.length);i++){ const x=A[i]||0,y=B[i]||0; if(x!==y) return x>y; } return false; }
async function checkForUpdate(){
  toast("Checking for updates…");
  try{
    const r=await fetch(`https://api.github.com/repos/${UPDATE_REPO}/releases/latest`,{headers:{"Accept":"application/vnd.github+json"}});
    if(r.status===404){ toast("No published release found yet."); return; }
    if(!r.ok){ toast("Couldn't check for updates (network)."); return; }
    const rel=await r.json();
    const latest=(rel.tag_name||"").replace(/^v/i,"");
    if(!latest || !isNewer(latest, APP_VERSION)){ toast(`You're on the latest version (v${APP_VERSION}).`); return; }
    const ua=navigator.userAgent||"";
    const isWin=/windows/i.test(ua), isMac=/mac/i.test(ua);
    const assets=rel.assets||[];
    let asset = isWin ? assets.find(a=>/\.exe$/i.test(a.name))
              : isMac ? assets.find(a=>/\.dmg$/i.test(a.name))
              : assets.find(a=>/\.(exe|dmg|appimage)$/i.test(a.name));
    if(!asset) asset = assets.find(a=>/\.(exe|dmg|appimage)$/i.test(a.name));
    showUpdateModal(latest, asset ? asset.browser_download_url : (rel.html_url||`https://github.com/${UPDATE_REPO}/releases/latest`), !!asset);
  }catch(e){ toast("Couldn't check for updates. Check your internet."); }
}
function showUpdateModal(latest, url, haveInstaller){
  const old=$("#updateOverlay"); if(old) old.remove();
  const canAuto = !!(window.smartScribe && window.smartScribe.downloadAndRun && haveInstaller);
  const wrap=document.createElement("div"); wrap.className="modal-overlay"; wrap.id="updateOverlay";
  wrap.innerHTML=`<div class="modal">
    <div class="modal-head"><h3>Update available</h3><button class="modal-x" id="upX">×</button></div>
    <div class="modal-body">
      <p style="margin:0 0 8px">A new version <b>v${esc(latest)}</b> is available. You have <b>v${APP_VERSION}</b>.</p>
      <p style="margin:0;color:var(--ink-soft);font-size:13px">${
        canAuto
          ? "Click Update — it downloads and launches the installer automatically, then Smart Scribe restarts on the new version. Approve the one-time Windows prompt if it appears."
          : haveInstaller
            ? "Click Download — the installer downloads in your browser. When it finishes, close Smart Scribe and run it (it installs over this version)."
            : "Click Download to open the releases page, then grab the installer for your system."}</p>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="upLater">Later</button>
      <button class="btn btn-steel" id="upGo">${canAuto?"Update now":"Download update"}</button>
    </div>
  </div>`;
  document.body.appendChild(wrap);
  const close=()=>wrap.remove();
  $("#upX").onclick=close; $("#upLater").onclick=close;
  wrap.addEventListener("click",e=>{ if(e.target===wrap) close(); });
  $("#upGo").onclick=async ()=>{
    if(canAuto){
      const btn=$("#upGo"); btn.disabled=true; $("#upLater").disabled=true; btn.textContent="Downloading… 0%";
      if(window.smartScribe.onUpdateProgress){ window.smartScribe.onUpdateProgress(pct=>{ if(btn) btn.textContent=`Downloading… ${pct}%`; }); }
      let res=null; try{ res=await window.smartScribe.downloadAndRun(url); }catch(_){ res={ok:false}; }
      if(res && res.ok){ btn.textContent="Installing…"; toast("Installer launched — approve any Windows prompt, then it restarts."); }
      else { btn.disabled=false; $("#upLater").disabled=false; btn.textContent="Download update"; toast("Auto-update failed — opening the download in your browser."); window.open(url,"_blank","noopener"); }
    } else {
      window.open(url,"_blank","noopener"); close(); toast("Downloading… run the installer when it finishes.");
    }
  };
}

/* ---- settings modal (voice engine + cloud key) ---- */
function openSettings(){
  closeSettings();
  const eng=state.voiceEngine||"auto";
  const mode=chosenMode();
  const wrap=document.createElement("div");
  wrap.id="settingsOverlay"; wrap.className="modal-overlay";
  wrap.innerHTML=`<div class="modal">
    <div class="modal-head"><h3>Settings</h3><button class="modal-x" id="setClose">×</button></div>
    <div class="modal-body">
      <div class="field"><label>Voice engine</label>
        <select class="txt" id="setEngine">
          <option value="auto" ${eng==="auto"?"selected":""}>Automatic (recommended)</option>
          <option value="browser" ${eng==="browser"?"selected":""}>Chrome built-in (free)</option>
          <option value="cloud" ${eng==="cloud"?"selected":""}>Cloud (Deepgram)</option>
        </select>
        <div class="field-note">Currently using: <b>${mode==="cloud"?"Cloud (Deepgram)":"Chrome built-in"}</b>${IS_ELECTRON?" — the desktop app requires cloud voice.":""}</div>
      </div>
      <div class="field"><label>Deepgram API key (for cloud voice)</label>
        <input class="txt" id="setKey" type="password" placeholder="Paste your Deepgram key" value="${esc(state.cloudKey||"")}">
        <div class="field-note">Get a free key at <b>console.deepgram.com</b> → Create API Key. Free credits included. Stored only on this device.</div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="setCancel">Cancel</button>
      <button class="btn btn-steel" id="setSave">Save</button>
    </div>
  </div>`;
  document.body.appendChild(wrap);
  $("#setClose").onclick=closeSettings; $("#setCancel").onclick=closeSettings;
  wrap.addEventListener("click",e=>{ if(e.target===wrap) closeSettings(); });
  $("#setSave").onclick=()=>{
    state.voiceEngine=$("#setEngine").value;
    state.cloudKey=$("#setKey").value.trim();
    saveState(); closeSettings(); render(); toast("Settings saved");
  };
}
function closeSettings(){ const o=$("#settingsOverlay"); if(o) o.remove(); }

function commitBuffer(){
  const p=activeProject(); if(!p) return false;
  if(voice.capturing && p.draft && p.draft.trim()){
    const ok=addNote(p.draft, ui.draftType);
    if(ok){ setDraft(""); voice.capturing=false; voice.lastSpeaker=null; return true; }
  }
  voice.capturing=false; voice.lastSpeaker=null; return false;
}
function appendSpoken(t){
  const p=activeProject(); if(!p) return;
  t=(t||"").trim(); if(!t) return;
  const cur=(p.draft||"");
  // Speaker-labeled segments go on their own lines; plain dictation flows inline.
  const sep = !cur ? "" : (t.startsWith("[[spk:") || cur.endsWith("\n") ? "\n" : " ");
  setDraft(cur + sep + t);
}
function handleFinal(raw, diarized){
  const clean = raw.toLowerCase().replace(/[.,!?;:'"]/g,"").replace(/\s+/g," ").trim();

  if(/\b(complete note|complete the note|export the note|export note)\b/.test(clean)){ commitBuffer(); completeNote(); return; }
  if(/\b(erase|delete|remove) (the )?previous note\b/.test(clean)){ voice.capturing=false; voice.lastSpeaker=null; if(eraseLast()) render(); return; }
  if(/\b(scratch that|clear (the )?note|discard note)\b/.test(clean)){ setDraft(""); voice.capturing=false; voice.lastSpeaker=null; toast("Cleared current entry"); return; }
  if(/\blog entry\b/.test(clean)){ if(commitBuffer()){ render(); toast("Entry logged"); } else { toast("Say “Note the following…” first"); } return; }
  if(/\b(save note|end note|save (the )?entry)\b/.test(clean)){ if(commitBuffer()){ render(); toast("Entry saved"); } return; }

  const idx = clean.indexOf("note the following");
  if(idx !== -1){
    commitBuffer();
    voice.capturing = true; voice.lastSpeaker=null;
    const oi = raw.toLowerCase().indexOf("note the following");
    let rest = oi!==-1 ? raw.slice(oi + "note the following".length) : "";
    rest = rest.replace(/^[\s:,\-–]+/,"").trim();
    setDraft(rest); render(); return;
  }
  if(voice.capturing) appendSpoken(diarized || raw);
}
function setMicStatus(){
  const el=$("#micStatus"); if(!el) return;
  if(!voice.listening){ el.innerHTML=""; return; }
  if(voice.interim){ el.innerHTML=`<span class="mic-live"></span><span class="mic-txt"><em>…</em> ${esc(voice.interim)}</span>`; return; }
  el.innerHTML = voice.capturing
    ? `<span class="mic-live"></span><span class="mic-txt">Dictating — say “log entry” to save, or keep talking</span>`
    : `<span class="mic-live"></span><span class="mic-txt">Listening — say “Note the following…”</span>`;
}

/* ============ command reference ============ */
function refHTML(){
  const typed=[
    ['Note the following: …','Log a new observation (note taking must be on)'],
    ['Complete note','Copy the whole transcript to the clipboard to paste into Google Docs'],
    ['Erase previous note','Delete the most recent entry'],
  ];
  const spoken=[
    ['“Note the following…”','Start dictating an entry; words after the phrase become the note'],
    ['“Log entry”','Immediately save the entry you are dictating and keep going'],
    ['“Save note” / “End note”','Also saves the current entry'],
    ['“Complete note”','Copy the whole transcript to the clipboard'],
    ['“Erase previous note”','Delete the most recent saved entry'],
    ['“Scratch that”','Clear the entry you are currently dictating'],
  ];
  const rows=a=>a.map(r=>`<div class="ref-row"><span class="ref-cmd">${r[0].replace(/^([^:“]+)(:)?/,(m,p1,p2)=>`<b>${p1}</b>${p2||""}`)}</span><span class="ref-desc">${r[1]}</span></div>`).join("");
  return `<div class="ref ${ui.refOpen?"":"collapsed"}" id="refBox">
    <div class="ref-top" id="refTop">
      <h2>Command reference</h2>
      <span class="ref-toggle">${ui.refOpen?"hide ▲":"show ▼"}</span>
    </div>
    <div class="ref-grid">
      <div class="ref-sub">Typed</div>${rows(typed)}
      <div class="ref-sub">Spoken · press 🎤 Dictate first</div>${rows(spoken)}
    </div>
  </div>`;
}

/* ============ render ============ */
function renderSidebar(){
  $("#projCount").textContent=state.projects.length;
  const list=$("#projList");
  if(!state.projects.length){ list.innerHTML=`<div class="proj-empty">No projects yet. Create one to start logging.</div>`; return; }
  list.innerHTML="";
  state.projects.forEach(p=>{
    const b=document.createElement("button");
    b.className="proj"+(p.id===state.activeId?" active":"");
    b.innerHTML=`<span class="nm">${esc(p.name)}</span>
      <span class="meta">${p.notes.length} entr${p.notes.length===1?"y":"ies"}${p.recording?" · ● rec":""}</span>`;
    b.onclick=()=>selectProject(p.id);
    list.appendChild(b);
  });
}

function render(){
  $("#loading")?.remove();
  renderSidebar();
  const main=$("#main");
  const p=activeProject();

  if(!p){
    main.innerHTML=`<div class="center-state"><div class="inner">
      <h2>No project open</h2>
      <p>Create a project in the left panel to begin. Each project keeps its own separate notes, voice session, and linked Google Doc.</p>
      <button class="new-btn" style="position:static;width:auto;margin:0 auto;padding:11px 22px" onclick="createProject()">＋ New project</button>
    </div></div>`;
    return;
  }

  const rec=p.recording;
  const vmode=chosenMode();
  const micUnsupported=!voiceAvailable();
  const needsKey = vmode==="cloud" && !(state.cloudKey||"").trim();
  const micLabel = micUnsupported ? "🎤 Voice N/A" : (voice.listening ? "● Stop dictation" : "🎤 Dictate");

  const notesHTML = p.notes.length
    ? p.notes.map(n=>{
        return `<div class="note">
          <button class="note-del" title="Delete entry" onclick="deleteNote('${n.id}')">×</button>
          <div class="note-meta">
            <span class="note-seq">Entry ${String(n.seq).padStart(3,"0")}</span>
            <span class="note-tag ${TYPES[n.type]?.tag||"tag-gen"}">${TYPES[n.type]?.label||"Note"}</span>
            <span class="note-time">${stamp(new Date(n.ts))}</span>
          </div>
          <div class="note-body">${renderNoteBody(p, n.text)}</div>
        </div>`;
      }).join("")
    : `<div class="log-empty">No entries yet. Start note taking, then type or dictate your observations.</div>`;

  const typeTabs=Object.entries(TYPES).map(([k,v])=>
    `<button class="type-tab ${ui.draftType===k?"sel":""}" data-type="${k}">${v.label}</button>`).join("");

  main.innerHTML = `<div class="wrap">
    ${refHTML()}

    <div class="p-head">
      <div style="flex:1;min-width:0" id="pTitleWrap"><h1 class="p-title">${esc(p.name)}</h1></div>
      <button class="edit-title" id="renameBtn">rename</button>
    </div>
    <div class="p-sub">Created ${stamp(new Date(p.createdAt))} · ${p.notes.length} entr${p.notes.length===1?"y":"ies"}${p.exportCount?` · exported ${p.exportCount}×`:""}</div>

    <div class="console">
      <div class="console-bar">
        <span class="status-pill ${rec?"on":"off"}"><span class="dot"></span>${rec?"Note Taking · Live":"Note Taking · Ended"}</span>
        <span class="mic-area" id="micStatus"></span>
        <button class="btn-mic ${voice.listening?"live":""}" id="micBtn" ${micUnsupported?"disabled title='Voice engine unavailable'":""}>${micLabel}</button>
        <button class="toggle-rec ${rec?"stop":"start"}" id="recBtn">${rec?"■ Note Taking End":"● Note Taking Start"}</button>
      </div>
      <div class="console-hint">${
        needsKey
          ? `Cloud voice is selected but no key is set. <a href="#" id="hintSettings" style="color:var(--trace)">Add a Deepgram key in Settings</a> to dictate. Typing works now.`
          : micUnsupported
            ? "Voice needs Chrome/Edge, or set a cloud key in Settings. Typing works everywhere."
            : `Tip: 🎤 Dictate, then say “Note the following…”, and “log entry” to save. Voice engine: ${vmode==="cloud"?"Cloud (Deepgram)":"Chrome built-in"} · change in Settings.${
                DIARIZE_MODES.has(ui.draftType)
                  ? (vmode==="cloud"
                      ? ` <span style="color:var(--trace)">Multi-speaker labeling is ON for ${esc(TYPES[ui.draftType].label)}.</span>`
                      : ` <span style="color:var(--amber-dim)">Multi-speaker needs Cloud voice — set a key in Settings.</span>`)
                  : "" }`
      }</div>
    </div>

    <div class="entry ${rec?"":"locked"} ${voice.capturing?"capturing":""}" id="entryBox">
      <div class="entry-tabs">${typeTabs}</div>
      <textarea class="note-in" id="noteIn" placeholder="${rec?'Type your observation here, or press 🎤 Dictate and speak it. Cmd/Ctrl + Enter logs the entry.':'Note taking is ended — press “Note Taking Start” to log.'}">${esc(p.draft||"")}</textarea>
      <div class="entry-actions">
        <button class="btn btn-primary" id="addBtn">Log entry</button>
        <button class="btn btn-rust" id="eraseBtn">Erase previous note</button>
      </div>
      ${!rec?`<div class="lock-note">Locked — the scribe only records while note taking is live.</div>`:""}
    </div>

    ${ hasSpeakers(p) ? `
    <div class="panel" id="spkPanel">
      <div class="panel-head">
        <h3>Speakers</h3>
        <span class="sync-chip sync-off">${detectedSpeakers(p).length} detected</span>
      </div>
      <div class="panel-body">
        <div class="spk-intro">Rename the auto-detected speakers. Names apply across every note in this project.</div>
        <div class="spk-grid">
          ${detectedSpeakers(p).map(n=>`
            <div class="spk-row">
              <span class="spk-badge">Person ${n+1}</span>
              <input class="txt spk-input" data-spk="${n}" placeholder="Person ${n+1}" value="${esc((p.speakers&&p.speakers[String(n)])||"")}">
            </div>`).join("")}
        </div>
      </div>
    </div>` : "" }

    <div class="log-head">
      <h3>Session log</h3>
      <div class="panel-btns">
        <span class="log-count">${p.notes.length} total</span>
        <button class="btn btn-steel" id="copyTranscriptBtn" ${p.notes.length?"":"disabled style=opacity:.4"}>📋 Copy transcript</button>
      </div>
    </div>
    <div class="log">${notesHTML}</div>
  </div>`;

  wireMain();
  setMicStatus();
}

/* ============ wiring ============ */
function bind(id,ev,fn){ const el=$("#"+id); if(el) el[ev]=fn; }
function wireMain(){
  bind("refTop","onclick",()=>{ ui.refOpen=!ui.refOpen; $("#refBox").classList.toggle("collapsed"); $("#refTop .ref-toggle").textContent=ui.refOpen?"hide ▲":"show ▼"; });
  bind("renameBtn","onclick",()=>renameProject(activeProject()));
  bind("recBtn","onclick",toggleRecording);
  bind("micBtn","onclick",toggleListening);
  bind("hintSettings","onclick",(e)=>{ e.preventDefault(); openSettings(); });
  document.querySelectorAll(".type-tab").forEach(t=>{
    t.onclick=()=>{
      ui.draftType=t.dataset.type;
      document.querySelectorAll(".type-tab").forEach(x=>x.classList.remove("sel")); t.classList.add("sel");
      // If dictating via cloud and the multi-speaker need changed, reconnect to apply it.
      if(voice.listening && voice.mode==="cloud" && diarizeWanted()!==voice.diarizeActive){
        stopCloud(); voice.lastSpeaker=null; startCloud();
        toast(diarizeWanted() ? "Multi-speaker on for this mode" : "Multi-speaker off");
      }
    };
  });
  const inp=$("#noteIn");
  if(inp){
    inp.addEventListener("input",()=>setDraft(inp.value,{dom:false}));
    inp.addEventListener("keydown",e=>{ if((e.metaKey||e.ctrlKey)&&e.key==="Enter") $("#addBtn").click(); });
  }
  bind("addBtn","onclick",()=>{
    const v=$("#noteIn").value;
    if(/^\s*(complete note|erase previous note)\s*$/i.test(v)){
      if(/complete/i.test(v)) completeNote(); else eraseLastConfirm();
      setDraft(""); return;
    }
    if(addNote(v, ui.draftType)){ setDraft(""); voice.capturing=false; render(); toast("Entry logged"); }
  });
  bind("completeBtn","onclick",completeNote);
  bind("eraseBtn","onclick",eraseLastConfirm);
  bind("copyTranscriptBtn","onclick",copyTranscript);
  document.querySelectorAll(".spk-input").forEach(inp=>{
    const commit=()=>{
      const p=activeProject(); if(!p) return;
      if(!p.speakers) p.speakers={};
      const n=inp.dataset.spk; const v=inp.value.trim();
      if(v) p.speakers[n]=v; else delete p.speakers[n];
      saveState();
      // live-update note bodies without losing focus
      document.querySelectorAll(".note-body").forEach((el,i)=>{ if(p.notes[i]) el.innerHTML=renderNoteBody(p, p.notes[i].text); });
    };
    inp.addEventListener("change", commit);
    inp.addEventListener("keydown", e=>{ if(e.key==="Enter"){ commit(); inp.blur(); } });
  });
}

/* ============ global wiring ============ */
$("#newProj").onclick=createProject;
$("#updateBtn").onclick=checkForUpdate;
$("#settingsBtn").onclick=openSettings;
$("#resetBtn").onclick=async()=>{
  if(!confirm("Delete ALL projects and notes permanently?")) return;
  releaseMic();
  state={projects:[],activeId:null};
  try{ await store.del(KEY);}catch(e){}
  saveState(); render(); toast("All data cleared");
};
$("#menuBtn").onclick=()=>{ $("#side").classList.toggle("open"); $("#scrim").classList.toggle("open"); };
$("#scrim").onclick=closeSide;
function closeSide(){ $("#side").classList.remove("open"); $("#scrim").classList.remove("open"); }
window.addEventListener("beforeunload",()=>{ releaseMic(); });

/* ============ boot ============ */
(async function(){
  await loadState();
  if(!state.activeId && state.projects.length) state.activeId=state.projects[0].id;
  render();
})();

/* Register service worker so the app is installable as a desktop app.
   Guarded: only runs when served over http(s)/localhost, not file://. */
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}
</script>
